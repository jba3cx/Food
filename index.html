<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Order Suggester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .tagline {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            font-size: 1.4em;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2::before {
            font-size: 1.2em;
        }

        .preferences h2::before { content: "🎯"; }
        .voting h2::before { content: "🗳️"; }
        .suggestion h2::before { content: "💡"; }

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button.secondary {
            background: #f5f5f5;
            color: #333;
        }

        button.secondary:hover {
            background: #e0e0e0;
        }

        .restaurant-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            justify-content: space-between;
        }

        .restaurant-info {
            display: flex;
            gap: 15px;
            flex: 1;
            align-items: center;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag.like {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .tag.dislike {
            background: #ffebee;
            color: #c62828;
        }

        .restaurant-name {
            font-weight: 600;
            color: #333;
            min-width: 150px;
        }

        .delete-btn {
            background: #ff6b6b;
            padding: 8px 12px;
            font-size: 0.9em;
            color: white;
        }

        .delete-btn:hover {
            background: #ff5252;
        }

        .voting-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .vote-btn {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .vote-btn.yes {
            background: #4caf50;
        }

        .vote-btn.yes:hover {
            background: #45a049;
        }

        .vote-btn.yes.active {
            background: #2e7d32;
        }

        .vote-btn.no {
            background: #f44336;
        }

        .vote-btn.no:hover {
            background: #da190b;
        }

        .vote-btn.no.active {
            background: #b71c1c;
        }

        .vote-status {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            color: #666;
            font-weight: 600;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .suggestion-section {
            text-align: center;
        }

        .suggestion-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .suggestion-label {
            font-size: 0.9em;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .suggestion-name {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .suggestion-reason {
            font-size: 0.95em;
            opacity: 0.85;
        }

        .get-suggestion-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .stat {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }

        .reset-btn {
            width: 100%;
            margin-top: 20px;
            background: #ff6b6b;
            padding: 10px;
            font-size: 0.9em;
        }

        .reset-btn:hover {
            background: #ff5252;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .suggestion-name {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ Food Order Suggester</h1>
            <p class="tagline">Decide together, eat together</p>
        </header>

        <div class="main-grid">
            <!-- Preferences Card -->
            <div class="card preferences">
                <h2>Your Preferences</h2>
                <div class="form-group">
                    <input type="text" id="restaurantInput" placeholder="Enter restaurant name..."
                        autocomplete="off">
                    <button onclick="addRestaurant()">Add</button>
                </div>

                <div id="restaurantList"></div>

                <div id="emptyPreferences" class="empty-state">
                    <p>No restaurants yet. Add some to get started!</p>
                </div>
            </div>

            <!-- Voting Card -->
            <div class="card voting">
                <h2>Today's Vote</h2>
                <p style="color: #666; margin-bottom: 20px;">Will you be ordering today?</p>

                <div class="voting-section">
                    <button class="vote-btn yes" id="yesBtn" onclick="voteYes()">Yes, I'm In!</button>
                    <button class="vote-btn no" id="noBtn" onclick="voteNo()">No, Not Today</button>
                </div>

                <div id="voteStatus" class="vote-status">Not voted yet</div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-number" id="yesCount">0</div>
                        <div class="stat-label">Ordering Today</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="totalPeople">0</div>
                        <div class="stat-label">Total People</div>
                    </div>
                </div>
            </div>

            <!-- Suggestion Card -->
            <div class="card suggestion full-width">
                <h2>Today's Suggestion</h2>
                <div id="suggestionBox" class="suggestion-box" style="display: none;">
                    <div class="suggestion-label">Let's eat at</div>
                    <div class="suggestion-name" id="suggestionName"></div>
                    <div class="suggestion-reason" id="suggestionReason"></div>
                </div>

                <div id="noSuggestion" class="empty-state">
                    <p>Add restaurants and vote to get a suggestion!</p>
                </div>

                <button class="get-suggestion-btn" onclick="generateSuggestion()">Get Suggestion</button>

                <button class="reset-btn" onclick="resetDaily()">Reset for Tomorrow</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'foodOrderData';

        function initData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    restaurants: {},
                    vote: null,
                    lastDate: new Date().toDateString()
                }));
            }
            checkDailyReset();
        }

        function getData() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY));
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            render();
        }

        function checkDailyReset() {
            const data = getData();
            const today = new Date().toDateString();
            if (data.lastDate !== today) {
                data.vote = null;
                data.lastDate = today;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }
        }

        function addRestaurant() {
            const input = document.getElementById('restaurantInput');
            const name = input.value.trim();
            if (!name) return;

            const data = getData();
            if (data.restaurants[name.toLowerCase()]) {
                alert('This restaurant is already on your list!');
                return;
            }

            data.restaurants[name.toLowerCase()] = {
                name: name,
                preference: null
            };

            input.value = '';
            saveData(data);
        }

        function setPreference(restaurantKey, preference) {
            const data = getData();
            data.restaurants[restaurantKey].preference = preference;
            saveData(data);
        }

        function deleteRestaurant(restaurantKey) {
            const data = getData();
            delete data.restaurants[restaurantKey];
            saveData(data);
        }

        function voteYes() {
            const data = getData();
            data.vote = true;
            saveData(data);
        }

        function voteNo() {
            const data = getData();
            data.vote = false;
            saveData(data);
        }

        function generateSuggestion() {
            const data = getData();

            if (data.vote === null) {
                alert('Please vote first (Yes or No)!');
                return;
            }

            if (data.vote === false) {
                showSuggestion('You opted out today', 'No suggestion for you!');
                return;
            }

            const restaurants = Object.values(data.restaurants);
            if (restaurants.length === 0) {
                alert('Add some restaurants first!');
                return;
            }

            // Score restaurants based on preferences
            const scored = restaurants.map(r => {
                let score = Math.random(); // Base randomness
                if (r.preference === 'like') score += 10;
                if (r.preference === 'dislike') score -= 10;
                if (r.preference === null) score += 5; // Neutral preference
                return { ...r, score };
            });

            const best = scored.reduce((a, b) => a.score > b.score ? a : b);
            let reason = 'Random pick';
            if (best.preference === 'like') reason = 'You like this place!';
            else if (best.preference === null) reason = 'Time to try something new!';
            else reason = 'Taking a chance on this one!';

            showSuggestion(best.name, reason);
        }

        function showSuggestion(name, reason) {
            document.getElementById('suggestionBox').style.display = 'block';
            document.getElementById('noSuggestion').style.display = 'none';
            document.getElementById('suggestionName').textContent = name;
            document.getElementById('suggestionReason').textContent = reason;
        }

        function resetDaily() {
            if (confirm('Clear today\'s vote and reset for tomorrow?')) {
                const data = getData();
                data.vote = null;
                saveData(data);
            }
        }

        function render() {
            const data = getData();

            // Render restaurants
            const list = document.getElementById('restaurantList');
            const restaurants = Object.entries(data.restaurants);
            const empty = document.getElementById('emptyPreferences');

            if (restaurants.length === 0) {
                list.innerHTML = '';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                list.innerHTML = restaurants.map(([key, r]) => `
                    <div class="restaurant-item">
                        <div class="restaurant-info">
                            <span class="restaurant-name">${r.name}</span>
                            <button class="tag ${r.preference === 'like' ? 'like' : ''}" 
                                onclick="setPreference('${key}', '${r.preference === 'like' ? 'null' : 'like'}')"
                                style="${r.preference === 'like' ? '' : 'opacity: 0.5;'}">
                                ❤️ Like
                            </button>
                            <button class="tag ${r.preference === 'dislike' ? 'dislike' : ''}"
                                onclick="setPreference('${key}', '${r.preference === 'dislike' ? 'null' : 'dislike'}')"
                                style="${r.preference === 'dislike' ? '' : 'opacity: 0.5;'}">
                                👎 Dislike
                            </button>
                        </div>
                        <button class="delete-btn" onclick="deleteRestaurant('${key}')">Delete</button>
                    </div>
                `).join('');
            }

            // Render votes
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const voteStatus = document.getElementById('voteStatus');

            yesBtn.classList.remove('active');
            noBtn.classList.remove('active');

            if (data.vote === true) {
                yesBtn.classList.add('active');
                voteStatus.innerHTML = '✅ You voted <strong>YES</strong> - You\'re ordering today!';
            } else if (data.vote === false) {
                noBtn.classList.add('active');
                voteStatus.innerHTML = '❌ You voted <strong>NO</strong> - Sitting this one out.';
            } else {
                voteStatus.innerHTML = 'Not voted yet';
            }

            // Update stats (simplified - assuming 1 person for now)
            document.getElementById('yesCount').textContent = data.vote === true ? 1 : 0;
            document.getElementById('totalPeople').textContent = 1;
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', () => {
            initData();
            render();

            // Allow Enter key to add restaurant
            document.getElementById('restaurantInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addRestaurant();
            });
        });
    </script>
</body>
</html>
